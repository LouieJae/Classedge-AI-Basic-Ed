{% comment %}Word scramble — included inside <form> by side_activity_play.html{% endcomment %}

{% for word in content.words %}
<div style="margin-bottom:2rem;{% if not forloop.last %}padding-bottom:1.5rem;border-bottom:1px solid var(--border);{% endif %}">
  <div style="text-align:center;margin-bottom:1rem;">
    <span style="font-size:2rem;font-weight:700;color:#f0b429;letter-spacing:.15em;font-family:monospace;">
      {{ word.scrambled }}
    </span>
  </div>

  {% if word.hint %}
  <p style="text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:1rem;">
    Hint: {{ word.hint }}
  </p>
  {% endif %}

  <input type="text" name="answer_{{ forloop.counter0 }}"
         placeholder="Unscramble the word"
         autocomplete="off"
         required
         style="width:100%;padding:.75rem 1rem;font-size:1.1rem;text-align:center;color:var(--text);background:var(--surface-2);border:1px solid var(--border);border-radius:8px;outline:none;letter-spacing:.05em;transition:border-color .15s;">
</div>
{% endfor %}
