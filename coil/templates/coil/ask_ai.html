<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Ask a Question</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap (optional for styling) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  {% include "includes/_native_dialogs.html" %}
</head>
<body class="bg-light">

  <div class="container mt-5">
    <div class="card shadow">
      <div class="card-header bg-primary text-white">
        <h4 class="mb-0">💬 Ask a Question</h4>
      </div>
      <div class="card-body">
        <form id="questionForm">
          <div class="mb-3">
            <label for="question" class="form-label">Your Question:</label>
            <textarea class="form-control" id="question" name="question" rows="3" required></textarea>
          </div>
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-paper-plane me-1"></i>
            </button>
        </form>

        <div class="mt-4" id="responseBox" style="display: none;">
          <h5>💡 Answer:</h5>
          <p id="answerText" class="text-dark fw-bold"></p>
        </div>
      </div>
    </div>
  </div>

<script>
  function getCSRFToken() {
    const name = 'csrftoken';
    const cookies = document.cookie.split(';');
    for (let i = 0; i < cookies.length; i++) {
      const cookie = cookies[i].trim();
      if (cookie.startsWith(name + '=')) {
        return decodeURIComponent(cookie.substring(name.length + 1));
      }
    }
    return '';
  }

  document.getElementById('questionForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const question = document.getElementById('question').value;
    const csrfToken = getCSRFToken();

    fetch('/ask_question/', {
      method: 'POST',
      headers: {
        'X-CSRFToken': csrfToken,
      },
      body: new URLSearchParams({ 'question': question })
    })
    .then(res => res.json())
    .then(data => {
      const responseBox = document.getElementById('responseBox');
      const answerText = document.getElementById('answerText');

      if (data.status === 'success') {
        typeWriterEffect(answerText, data.answer);
        document.getElementById('question').value = ''; // ✅ Clear the textarea
      } else {
        answerText.textContent = "⚠️ Error: " + data.message;
      }

      responseBox.style.display = 'block';
    })
    .catch(error => {
      alert("Something went wrong. Check the console.");
      console.error(error);
    });
  });

  document.getElementById('question').addEventListener('keydown', function (e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault(); // Don't insert newline
      document.getElementById('questionForm').requestSubmit(); // Trigger form submit
    }
  });

  function typeWriterEffect(element, text, speed = 30) {
    element.textContent = '';
    let i = 0;
    function type() {
      if (i < text.length) {
        element.textContent += text.charAt(i);
        i++;
        setTimeout(type, speed);
      }
    }
    type();
  }
</script>

</body>
</html>
