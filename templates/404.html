{% load static %}<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>404 · Page not found · {{ SCHOOL_NAME|default:"ClassEdge" }}</title>
  <link rel="icon" type="image/png" href="{{ MEDIA_URL }}logos/HCCCI-logo.png" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --brand-primary: {{ SCHOOL_BRAND_COLOR|default:'#b7925a' }};
      --brand-primary-soft: color-mix(in srgb, var(--brand-primary) 16%, transparent);
      --paper: #ffffff;
      --bg: #f6f4ef;
      --ink: #1f2530;
      --ink-dim: #5e6473;
      --ink-muted: #9aa0ad;
      --border: rgba(31, 37, 48, 0.08);
      --info: #2c7be5;
      --info-soft: color-mix(in srgb, var(--info) 14%, transparent);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; padding: 0;
      min-height: 100%;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(ellipse at top right, var(--brand-primary-soft) 0%, transparent 55%),
        radial-gradient(ellipse at bottom left, var(--info-soft) 0%, transparent 50%),
        var(--bg);
      -webkit-font-smoothing: antialiased;
    }
    .err-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .err-card {
      width: 100%; max-width: 880px;
      background: var(--paper);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 32px 80px -28px rgba(31, 37, 48, 0.22);
      overflow: hidden;
      display: grid; grid-template-columns: 1fr 1fr;
    }
    @media (max-width: 760px) {
      .err-card { grid-template-columns: 1fr; max-width: 480px; }
      .err-illus { padding: 32px 24px 0; }
      .err-content { padding: 32px 28px 40px; }
      .err-code { font-size: 72px; }
    }
    .err-content {
      padding: 56px 48px;
      display: flex; flex-direction: column; justify-content: center;
      gap: 14px;
    }
    .err-eyebrow {
      display: inline-flex; align-items: center; gap: 8px;
      font-size: 11px; font-weight: 700;
      letter-spacing: 0.16em; text-transform: uppercase;
      color: var(--brand-primary);
      padding: 5px 12px;
      border-radius: 999px;
      background: var(--brand-primary-soft);
      align-self: flex-start;
    }
    .err-code {
      font-size: 96px; font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--ink);
      margin: 0;
    }
    .err-code em {
      font-style: italic;
      font-weight: 500;
      color: var(--brand-primary);
    }
    .err-title {
      font-size: 22px; font-weight: 700; margin: 0;
      letter-spacing: -0.01em;
    }
    .err-sub {
      font-size: 15px; color: var(--ink-dim); margin: 0;
      line-height: 1.55; max-width: 36ch;
    }
    .err-actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 12px; }
    .err-btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px;
      border-radius: 100px;
      font-size: 14px; font-weight: 600;
      text-decoration: none;
      border: 1px solid transparent;
      transition: transform .15s ease, box-shadow .15s ease, background .15s ease;
      cursor: pointer;
    }
    .err-btn-primary {
      background: var(--brand-primary);
      color: #ffffff;
      box-shadow: 0 8px 24px -10px var(--brand-primary-soft);
    }
    .err-btn-primary:hover {
      transform: translateY(-1px);
      background: color-mix(in srgb, var(--brand-primary), black 12%);
    }
    .err-btn-ghost {
      background: transparent;
      color: var(--ink-dim);
      border-color: var(--border);
    }
    .err-btn-ghost:hover {
      color: var(--ink);
      border-color: var(--brand-primary);
    }
    .err-illus {
      padding: 56px 32px;
      background: linear-gradient(135deg, var(--brand-primary-soft) 0%, transparent 70%);
      display: flex; align-items: center; justify-content: center;
    }
    .err-illus svg { width: 100%; max-width: 320px; height: auto; }
    .err-meta {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; color: var(--ink-muted);
      margin-top: 4px;
    }
    /* Compass needle wobble — playful but subtle */
    .compass-needle { transform-origin: 160px 160px; animation: wobble 4s ease-in-out infinite; }
    @keyframes wobble {
      0%, 100% { transform: rotate(-18deg); }
      50%      { transform: rotate(22deg); }
    }
  </style>
</head>
<body>
  <div class="err-page">
    <div class="err-card">
      <div class="err-content">
        <span class="err-eyebrow"><i class="fas fa-compass"></i> Lost your way?</span>
        <h1 class="err-code">4<em>0</em>4</h1>
        <p class="err-title">This page doesn't exist.</p>
        <p class="err-sub">
          The link might be broken, or the page may have been moved or renamed. Let's get
          you back on the trail.
        </p>
        <div class="err-actions">
          <a class="err-btn err-btn-primary" href="/">
            <i class="fas fa-house" aria-hidden="true"></i> Back to dashboard
          </a>
          <a class="err-btn err-btn-ghost" href="javascript:history.back()">
            <i class="fas fa-arrow-left" aria-hidden="true"></i> Go back
          </a>
        </div>
        <span class="err-meta">
          <i class="fas fa-map" aria-hidden="true"></i>
          Error code · 404 Not Found
        </span>
      </div>

      <div class="err-illus" aria-hidden="true">
        <svg viewBox="0 0 320 320" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="compassBody404" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="var(--brand-primary)" stop-opacity="0.95"/>
              <stop offset="100%" stop-color="var(--brand-primary)" stop-opacity="0.65"/>
            </linearGradient>
          </defs>
          <ellipse cx="160" cy="285" rx="120" ry="14" fill="var(--brand-primary)" opacity="0.10"/>
          <!-- Outer compass ring -->
          <circle cx="160" cy="160" r="110" fill="url(#compassBody404)"/>
          <circle cx="160" cy="160" r="110" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.45"/>
          <!-- Inner face -->
          <circle cx="160" cy="160" r="90" fill="#ffffff" opacity="0.96"/>
          <!-- Cardinal ticks -->
          <g stroke="var(--ink-dim)" stroke-width="2" stroke-linecap="round">
            <line x1="160" y1="75"  x2="160" y2="88"/>
            <line x1="160" y1="232" x2="160" y2="245"/>
            <line x1="75"  y1="160" x2="88"  y2="160"/>
            <line x1="232" y1="160" x2="245" y2="160"/>
          </g>
          <g fill="var(--ink-dim)" font-family="Inter, sans-serif" font-size="12" font-weight="700" text-anchor="middle">
            <text x="160" y="71">N</text>
            <text x="160" y="262">S</text>
            <text x="68"  y="164">W</text>
            <text x="252" y="164">E</text>
          </g>
          <!-- Compass needle (wobbles) -->
          <g class="compass-needle">
            <polygon points="160,90 150,160 160,150 170,160" fill="var(--info)"/>
            <polygon points="160,230 150,160 160,170 170,160" fill="var(--ink-dim)"/>
          </g>
          <!-- Center pin -->
          <circle cx="160" cy="160" r="7" fill="var(--ink)" stroke="#ffffff" stroke-width="2"/>
          <!-- Magnifying glass corner accent -->
          <g transform="translate(238 76)">
            <circle cx="0" cy="0" r="20" fill="none" stroke="var(--info)" stroke-width="4"/>
            <line x1="14" y1="14" x2="28" y2="28" stroke="var(--info)" stroke-width="4" stroke-linecap="round"/>
          </g>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
