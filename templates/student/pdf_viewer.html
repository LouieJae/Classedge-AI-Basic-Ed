<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Material PDF</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="csrf-token" content="{{ csrf_token }}" />
<style>
  :root {
    --bg: #0a0f1f;
    --bg-2: #111930;
    --surface: rgba(22, 30, 54, 0.72);
    --border: rgba(255, 255, 255, 0.12);
    --text: #eef2ff;
    --text-dim: #9aa3c0;
    --gold: #f4b740;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter Tight', system-ui, sans-serif; }
  body { display: flex; flex-direction: column; }

  .toolbar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 14px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .toolbar button {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 6px;
    font: inherit;
    font-size: 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .toolbar button:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
  .toolbar button:disabled { opacity: 0.35; cursor: default; }
  .page-info { font-size: 13px; color: var(--text-dim); display: inline-flex; align-items: center; gap: 6px; }
  .page-info input {
    width: 56px;
    padding: 5px 8px;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    text-align: center;
    font: inherit;
    font-size: 13px;
  }
  .page-info input:focus { outline: none; border-color: var(--gold); }
  .toolbar .spacer { flex: 1; }
  .zoom-info { font-size: 12px; color: var(--text-dim); min-width: 44px; text-align: center; }

  #viewer {
    flex: 1;
    overflow: auto;
    padding: 24px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    background:
      radial-gradient(ellipse at top left, rgba(244, 183, 64, 0.06), transparent 60%),
      var(--bg);
  }
  canvas {
    box-shadow: 0 8px 32px -8px rgba(0,0,0,0.55);
    border-radius: 6px;
    max-width: 100%;
    height: auto;
    background: #fff;
  }
  .status {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    padding: 80px 20px; color: var(--text-dim); font-size: 14px;
    text-align: center;
  }
  .status .icon { font-size: 28px; opacity: 0.5; }
  .status.error { color: #ff6b6b; }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<div class="toolbar">
  <button id="prev-btn" disabled aria-label="Previous page">&larr; Prev</button>
  <span class="page-info">
    Page <input type="number" id="page-input" min="1" value="1" disabled />
    / <span id="total-pages">&mdash;</span>
  </span>
  <button id="next-btn" disabled aria-label="Next page">Next &rarr;</button>
  <span class="spacer"></span>
  <button id="zoom-out-btn" aria-label="Zoom out">&minus;</button>
  <span class="zoom-info" id="zoom-info">100%</span>
  <button id="zoom-in-btn" aria-label="Zoom in">+</button>
  <button id="zoom-fit-btn" aria-label="Fit to width">Fit</button>
</div>

<div id="viewer">
  <div class="status" id="status">
    <div class="spinner"></div>
    <div>Loading PDF&hellip;</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
(function() {
  if (!window.pdfjsLib) {
    document.getElementById('status').classList.add('error');
    document.getElementById('status').innerHTML = 'Failed to load PDF.js library.';
    return;
  }
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  // ── Inputs from query string ─────────────────────────────────
  const params = new URLSearchParams(window.location.search);
  const fileUrl = params.get('file');
  const moduleId = params.get('module');

  // ── State ────────────────────────────────────────────────────
  let pdfDoc = null;
  let currentPage = 1;
  let zoom = 1.4;
  let fitToWidth = false;
  let renderTask = null;
  let saveTimer = null;
  let lastSavedPage = null;

  const viewer = document.getElementById('viewer');
  const status = document.getElementById('status');
  const prevBtn = document.getElementById('prev-btn');
  const nextBtn = document.getElementById('next-btn');
  const pageInput = document.getElementById('page-input');
  const totalPagesEl = document.getElementById('total-pages');
  const zoomInfo = document.getElementById('zoom-info');

  function getCSRF() {
    const meta = document.querySelector('meta[name="csrf-token"]');
    if (meta && meta.content) return meta.content;
    const m = document.cookie.match(/csrftoken=([^;]+)/);
    return m ? m[1] : '';
  }

  function setStatus(text, isError) {
    status.classList.toggle('error', !!isError);
    status.innerHTML = text;
    viewer.innerHTML = '';
    viewer.appendChild(status);
  }

  function saveProgress(page) {
    if (!moduleId || !pdfDoc) return;
    if (page === lastSavedPage) return;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(() => {
      lastSavedPage = page;
      const payload = {
        module_id: moduleId,
        last_page: page,
        progress: pdfDoc.numPages > 0 ? (page / pdfDoc.numPages) * 100 : 0,
      };
      fetch('/module-progress/', {
        method: 'POST',
        credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json', 'X-CSRFToken': getCSRF() },
        body: JSON.stringify(payload),
      }).catch(() => { /* swallow network errors */ });
    }, 600);
  }

  async function fetchSavedPage() {
    if (!moduleId) return 1;
    try {
      const r = await fetch(`/module-progress/?module_id=${encodeURIComponent(moduleId)}`, {
        credentials: 'same-origin',
      });
      if (!r.ok) return 1;
      const data = await r.json();
      return Math.max(1, parseInt(data.last_page || 1, 10));
    } catch (_) {
      return 1;
    }
  }

  async function renderPage(num) {
    if (!pdfDoc) return;
    num = Math.max(1, Math.min(num, pdfDoc.numPages));
    currentPage = num;
    pageInput.value = num;
    prevBtn.disabled = num <= 1;
    nextBtn.disabled = num >= pdfDoc.numPages;

    if (renderTask) {
      try { renderTask.cancel(); } catch (_) {}
    }

    const page = await pdfDoc.getPage(num);

    let scale = zoom;
    if (fitToWidth) {
      const unscaled = page.getViewport({ scale: 1 });
      const containerWidth = viewer.clientWidth - 40;
      scale = Math.max(0.5, containerWidth / unscaled.width);
      zoom = scale;
      zoomInfo.textContent = Math.round((scale / 1.4) * 100) + '%';
    }

    const viewport = page.getViewport({ scale });
    const canvas = document.createElement('canvas');
    canvas.width = viewport.width;
    canvas.height = viewport.height;

    viewer.innerHTML = '';
    viewer.appendChild(canvas);

    renderTask = page.render({
      canvasContext: canvas.getContext('2d'),
      viewport,
    });
    try {
      await renderTask.promise;
    } catch (e) {
      if (e && e.name === 'RenderingCancelledException') return;
      throw e;
    }

    saveProgress(num);
  }

  async function load() {
    if (!fileUrl) {
      setStatus('No file specified.', true);
      return;
    }
    try {
      const loadingTask = pdfjsLib.getDocument({
        url: fileUrl,
        withCredentials: true,
      });
      pdfDoc = await loadingTask.promise;
      totalPagesEl.textContent = pdfDoc.numPages;
      pageInput.max = pdfDoc.numPages;
      pageInput.disabled = false;

      const startPage = await fetchSavedPage();
      lastSavedPage = startPage;
      await renderPage(startPage);
    } catch (err) {
      console.error(err);
      setStatus('Could not load PDF: ' + (err.message || 'unknown error'), true);
    }
  }

  // ── UI handlers ──────────────────────────────────────────────
  prevBtn.addEventListener('click', () => renderPage(currentPage - 1));
  nextBtn.addEventListener('click', () => renderPage(currentPage + 1));

  pageInput.addEventListener('change', () => {
    const n = parseInt(pageInput.value, 10);
    if (!isNaN(n)) renderPage(n);
  });

  document.getElementById('zoom-in-btn').addEventListener('click', () => {
    fitToWidth = false;
    zoom = Math.min(zoom + 0.25, 4);
    zoomInfo.textContent = Math.round((zoom / 1.4) * 100) + '%';
    renderPage(currentPage);
  });
  document.getElementById('zoom-out-btn').addEventListener('click', () => {
    fitToWidth = false;
    zoom = Math.max(zoom - 0.25, 0.5);
    zoomInfo.textContent = Math.round((zoom / 1.4) * 100) + '%';
    renderPage(currentPage);
  });
  document.getElementById('zoom-fit-btn').addEventListener('click', () => {
    fitToWidth = true;
    renderPage(currentPage);
  });

  document.addEventListener('keydown', (e) => {
    if (document.activeElement === pageInput) return;
    if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
      e.preventDefault();
      renderPage(currentPage - 1);
    } else if (e.key === 'ArrowRight' || e.key === 'PageDown' || e.key === ' ') {
      e.preventDefault();
      renderPage(currentPage + 1);
    }
  });

  // Final save on close.
  window.addEventListener('beforeunload', () => {
    if (currentPage && pdfDoc) {
      const payload = JSON.stringify({
        module_id: moduleId,
        last_page: currentPage,
        progress: pdfDoc.numPages > 0 ? (currentPage / pdfDoc.numPages) * 100 : 0,
      });
      const blob = new Blob([payload], { type: 'application/json' });
      // sendBeacon doesn't include CSRF token, so it'll fail if CSRF is enforced;
      // the periodic save during navigation already covered most cases.
      try { navigator.sendBeacon('/module-progress/', blob); } catch (_) {}
    }
  });

  load();
})();
</script>

</body>
</html>
