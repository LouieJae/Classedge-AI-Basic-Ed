{% comment %}
[Classedge LMS] Shared form-card styles. Include alongside _list_page_theme.html
on any create/update page. Provides .cl-form-card, .cl-field, .cl-form-grid,
.cl-form-actions, .cl-form-alert classes that are dark-mode aware.
{% endcomment %}
<style>
  .cl-form-card {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 28px;
    max-width: 880px;
  }
  .cl-form-section { margin-bottom: 22px; }
  .cl-form-section h6 {
    font-family: var(--display);
    color: var(--ink);
    font-size: 15px; font-weight: 600;
    margin: 0 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 8px;
  }
  .cl-form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px 18px;
  }
  @media (max-width: 720px) { .cl-form-grid { grid-template-columns: 1fr; } }

  .cl-field { min-width: 0; }
  .cl-field.full { grid-column: 1 / -1; }
  .cl-field label {
    display: block;
    font-weight: 600; font-size: 11.5px;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--ink-dim); margin-bottom: 6px;
  }
  .cl-field .req { color: #c0392b; }
  .cl-field input[type="text"],
  .cl-field input[type="email"],
  .cl-field input[type="number"],
  .cl-field input[type="date"],
  .cl-field input[type="password"],
  .cl-field input[type="tel"],
  .cl-field select,
  .cl-field textarea {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    font-family: var(--body); font-size: 13.5px;
    background: var(--paper); color: var(--ink);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .cl-field input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--brand-primary, #b7925a); margin-right: 6px; }
  .cl-field input[type="file"] {
    width: 100%; padding: 9px 12px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-sm); background: var(--cream);
    font-size: 12.5px;
  }
  .cl-field input:focus, .cl-field select:focus, .cl-field textarea:focus {
    outline: none; border-color: var(--brand-primary, #b7925a);
    box-shadow: 0 0 0 3px var(--brand-primary-soft);
  }
  .cl-field .hint { color: var(--ink-muted); font-size: 11.5px; margin-top: 4px; font-weight: 400; text-transform: none; letter-spacing: 0; }
  .cl-field .err { color: #b02a37; font-size: 12px; margin-top: 4px; }

  .cl-form-actions {
    display: flex; gap: 10px;
    margin-top: 24px; padding-top: 18px;
    border-top: 1px solid var(--border);
  }

  .cl-form-alert {
    padding: 12px 14px;
    border-radius: var(--radius-sm);
    font-size: 13px; margin-bottom: 16px;
    border: 1px solid var(--border-strong);
  }
  .cl-form-alert.error, .cl-form-alert.danger {
    background: rgba(192,57,43,0.06);
    border-color: rgba(192,57,43,0.2);
    color: #8b2a1f;
  }
</style>
