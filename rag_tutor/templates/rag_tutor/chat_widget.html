<div id="rag-tutor-widget">
    <button id="rag-toggle" onclick="toggleRagChat()"
        class="btn btn-primary rounded-circle shadow"
        style="position:fixed;bottom:24px;right:24px;width:56px;height:56px;z-index:1050;font-size:1.4rem;"
        title="Ask AI Tutor">
        <i class="fas fa-robot"></i>
    </button>

    <div id="rag-panel" style="display:none;position:fixed;bottom:90px;right:24px;width:380px;max-height:500px;z-index:1050;" class="card shadow-lg">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center py-2">
            <span class="fw-semibold">AI Tutor</span>
            <button class="btn btn-sm btn-light" onclick="toggleRagChat()">&times;</button>
        </div>
        <div id="rag-messages" class="card-body p-3" style="overflow-y:auto;max-height:360px;">
            <p class="text-muted small">Ask me anything about your course materials.</p>
        </div>
        <div class="card-footer p-2">
            <form id="rag-form" onsubmit="sendRagQuestion(event)" class="d-flex gap-2">
                <input type="text" id="rag-input" class="form-control form-control-sm" placeholder="Type your question..." required>
                <button type="submit" class="btn btn-primary btn-sm" id="rag-send">
                    <i class="fas fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </div>
</div>

<script>
function toggleRagChat() {
    const panel = document.getElementById('rag-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    if (panel.style.display === 'block') document.getElementById('rag-input').focus();
}

function sendRagQuestion(e) {
    e.preventDefault();
    const input = document.getElementById('rag-input');
    const q = input.value.trim();
    if (!q) return;

    const msgs = document.getElementById('rag-messages');
    msgs.innerHTML += '<div class="mb-2 text-end"><span class="badge bg-primary text-wrap text-start" style="max-width:85%;display:inline-block;">' + escapeHtml(q) + '</span></div>';
    msgs.innerHTML += '<div class="mb-2" id="rag-loading"><span class="text-muted small"><i class="fas fa-spinner fa-spin"></i> Thinking...</span></div>';
    msgs.scrollTop = msgs.scrollHeight;
    input.value = '';

    const subjectId = {{ subject.pk }};
    fetch('/rag-tutor/ask/' + subjectId + '/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': document.querySelector('meta[name="csrf-token"]').content,
        },
        body: JSON.stringify({question: q}),
    })
    .then(r => r.json())
    .then(data => {
        document.getElementById('rag-loading').remove();
        let html = '<div class="mb-2"><div class="bg-light rounded p-2 small" style="max-width:90%;">';
        html += escapeHtml(data.answer).replace(/\n/g, '<br>');
        if (data.sources && data.sources.length > 0) {
            html += '<div class="mt-1 text-muted" style="font-size:0.75rem;">Sources: ';
            html += data.sources.map(s => s.title).join(', ');
            html += '</div>';
        }
        html += '</div></div>';
        msgs.innerHTML += html;
        msgs.scrollTop = msgs.scrollHeight;
    })
    .catch(() => {
        document.getElementById('rag-loading').remove();
        msgs.innerHTML += '<div class="mb-2"><span class="text-danger small">Something went wrong. Please try again.</span></div>';
    });
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}
</script>
