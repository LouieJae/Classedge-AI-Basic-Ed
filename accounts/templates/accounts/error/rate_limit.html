<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Rate Limit Exceeded</title>

  <!-- Bootstrap CSS (CDN) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Font Awesome (CDN) -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">

  <style>
    /* small visual tweaks */
    body { background: #f8f9fa; }
    .card { box-shadow: 0 6px 18px rgba(0,0,0,0.06); }
    .lead { font-size: 1.05rem; }
  </style>
</head>
<body>

  <div class="container mt-5">
      <div class="row justify-content-center">
          <div class="col-md-6">
              <div class="card border-warning">
                  <div class="card-header bg-warning text-white">
                      <h4><i class="fas fa-exclamation-triangle"></i> Too Many Requests</h4>
                  </div>
                  <div class="card-body">
                      <p class="lead">You've made too many requests. Please try again later.</p>
                      <p>For security reasons, we limit the number of requests from each IP address.</p>

                      <!-- Edit the value of RETRY_SECONDS below to change the displayed wait time -->
                      <p><strong>Please wait <span id="retrySeconds">3600</span> seconds before trying again.</strong></p>

                      <!-- Update this href to point to your actual home/admin URL -->
                      <a href="/" class="btn btn-primary mt-3">
                          <i class="fas fa-home"></i> Return to Home
                      </a>
                  </div>
              </div>
          </div>
      </div>
  </div>

  <!-- Optional: small script to set retry seconds dynamically -->
  <script>
    // If you want to override the retry seconds at runtime,
    // set window.RETRY_SECONDS before this script runs, or change the default below.
    const RETRY_SECONDS = window.RETRY_SECONDS ?? 3600;
    document.getElementById('retrySeconds').textContent = RETRY_SECONDS;
  </script>

  <!-- Bootstrap JS (optional) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
