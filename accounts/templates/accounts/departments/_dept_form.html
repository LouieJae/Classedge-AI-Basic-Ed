{% comment %}
[Classedge LMS] Shared department form for create + edit modals.
Renders inside `.rl-modal-content` — supplies its own `.rl-form` body+foot.
{% endcomment %}
<style>
  .dept-form .field { margin-bottom: 6px; }
  .dept-form label {
    display: block;
    font-weight: 700; font-size: 11px;
    text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--ink-dim); margin-bottom: 8px;
  }
  .dept-form input[type="text"] {
    width: 100%;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    padding: 11px 14px;
    font-family: var(--body); font-size: 13.5px;
    background: var(--paper); color: var(--ink);
    transition: border-color 0.15s ease, box-shadow 0.15s ease;
  }
  .dept-form input[type="text"]:focus {
    outline: none;
    border-color: var(--brand-primary, #1b4332);
    box-shadow: 0 0 0 3px var(--brand-primary-soft);
  }
  .dept-form .hint {
    display: block; margin-top: 8px;
    font-size: 12px; color: var(--ink-muted); font-weight: 400;
  }
  .dept-btn {
    display: inline-flex; align-items: center; gap: 7px;
    padding: 9px 18px;
    border-radius: var(--radius-sm);
    font-family: var(--body); font-size: 12.5px; font-weight: 600;
    border: 1px solid var(--border-strong);
    background: var(--paper); color: var(--ink);
    cursor: pointer;
    transition: all 0.18s ease;
  }
  .dept-btn:hover { background: var(--cream-2); color: var(--ink); border-color: var(--brand-primary, #1b4332); }
  .dept-btn-primary { background: var(--brand-primary, #1b4332); color: var(--cream); border-color: var(--brand-primary, #1b4332); }
  .dept-btn-primary:hover { background: var(--brand-primary, #1b4332); color: var(--cream); border-color: var(--brand-primary, #1b4332); }
</style>

<form method="post"
      action="{% if dept %}{% url 'department_settings' dept.id %}{% else %}{% url 'department_create' %}{% endif %}"
      class="dept-form rl-form"
      data-cl-loading data-cl-loading-label="Saving…">
  {% csrf_token %}
  <div class="rl-form-body">
    <div class="field">
      <label for="dept-name-input">Department name</label>
      <input id="dept-name-input" type="text" name="name" required maxlength="100"
             value="{{ dept.name|default:'' }}" autocomplete="off">
      <span class="hint">Must be unique across departments.</span>
    </div>
  </div>
  <div class="rl-form-foot">
    <button type="button" class="dept-btn"
      onclick="document.getElementById('addDepartmentModal')?.classList.remove('show'); document.getElementById('addDepartmentBackdrop')?.classList.remove('show'); document.getElementById('editDepartmentModal')?.classList.remove('show'); document.getElementById('editDepartmentBackdrop')?.classList.remove('show');">Cancel</button>
    <button type="submit" class="dept-btn dept-btn-primary">
      <i class="fas fa-save"></i> {% if dept %}Save changes{% else %}Create department{% endif %}
    </button>
  </div>
</form>
