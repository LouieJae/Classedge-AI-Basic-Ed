{% comment %}
Shared styles for the lesson import flows (from previous semester / from
another subject). Include after _legacy_stack.html so Bootstrap is loaded
and our overrides win.
{% endcomment %}
<style>
  .imp-shell { max-width: 1080px; }
  .imp-back {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 9px 16px;
    background: var(--paper);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm, 12px);
    color: var(--ink); font-size: 13px; font-weight: 600;
    text-decoration: none; margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(45,49,66,0.04);
    transition: all 0.18s ease;
  }
  .imp-back:hover {
    background: var(--cream-2); color: var(--ink);
    border-color: var(--brand-primary, #b7925a); text-decoration: none;
    transform: translateX(-2px);
  }
  .imp-back i { font-size: 11px; transition: transform 0.18s ease; }
  .imp-back:hover i { transform: translateX(-2px); }

  .imp-header { margin-bottom: 24px; }
  .imp-header .page-title { margin-bottom: 4px; }
  .imp-header .page-sub { font-size: 14px; }

  .form-panel {
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 32px 36px;
  }
  .form-section + .form-section {
    margin-top: 28px; padding-top: 24px;
    border-top: 1px solid var(--border);
  }
  .form-section-title {
    font-family: var(--body);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--brand-primary, #b7925a);
    font-weight: 700;
    margin: 0 0 16px;
  }

  .field { margin-bottom: 18px; }
  .field:last-child { margin-bottom: 0; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  @media (max-width: 720px) { .field-row { grid-template-columns: 1fr; } }

  .field > label {
    display: flex; align-items: center; gap: 6px;
    font-size: 13px; font-weight: 600; color: var(--ink);
    margin-bottom: 6px;
  }
  .field-help {
    display: block; font-size: 12px;
    color: var(--ink-dim); margin-top: 6px;
  }
  .form-panel input.form-control,
  .form-panel select.form-control,
  .form-panel select.form-select,
  .form-panel input[type="text"],
  .form-panel input[type="datetime-local"],
  .form-panel select,
  .form-panel textarea {
    width: 100%;
    padding: 10px 14px;
    font-family: var(--body);
    font-size: 14px;
    color: var(--ink);
    background: var(--cream);
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm);
    line-height: 1.4;
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .form-panel input:focus,
  .form-panel select:focus,
  .form-panel textarea:focus {
    outline: none;
    border-color: var(--brand-primary, #b7925a);
    box-shadow: 0 0 0 3px var(--brand-primary-soft);
  }

  /* ─── Override toggle (subject import) ─────────── */
  .override-toggle {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px;
    background: var(--cream-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    cursor: pointer;
  }
  .override-toggle input[type="checkbox"] {
    width: 18px; height: 18px;
    accent-color: var(--ink); margin: 0;
    flex-shrink: 0;
  }
  .override-toggle .text {
    display: flex; flex-direction: column; gap: 2px;
  }
  .override-toggle .name {
    font-size: 13.5px; font-weight: 600; color: var(--ink);
  }
  .override-toggle .desc {
    font-size: 12px; color: var(--ink-dim); line-height: 1.4;
  }

  /* ─── Material selection list ────────────────────── */
  .lesson-pool { display: flex; flex-direction: column; gap: 24px; }
  .pool-empty {
    padding: 56px 24px; text-align: center;
    color: var(--ink-dim); font-style: italic;
    background: var(--cream-2);
    border-radius: var(--radius-sm);
    border: 1px dashed var(--border-strong);
  }
  .pool-loading {
    padding: 56px 24px; text-align: center;
    color: var(--ink-dim); font-size: 13px;
  }
  .pool-loading i { margin-right: 8px; color: var(--brand-primary, #b7925a); }

  .semester-group .semester-label {
    font-family: var(--display);
    font-size: 16px; font-weight: 600;
    color: var(--ink);
    margin: 0 0 10px;
    letter-spacing: -0.005em;
  }
  .term-group { margin-bottom: 16px; }
  .term-group:last-child { margin-bottom: 0; }
  .term-group .term-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-muted);
    font-weight: 700;
    margin: 0 0 8px 4px;
  }

  .pool-toolbar {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px;
    background: var(--cream-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 14px;
    font-size: 13px;
  }
  .pool-toolbar label {
    display: inline-flex; align-items: center; gap: 8px;
    font-weight: 600; color: var(--ink); margin: 0; cursor: pointer;
  }
  .pool-toolbar label input { width: 16px; height: 16px; accent-color: var(--ink); }
  .pool-count {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-dim);
    font-weight: 600;
  }
  .pool-count strong { color: var(--ink); }

  .lesson-card {
    display: flex; align-items: flex-start; gap: 14px;
    padding: 14px 16px;
    background: var(--paper);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    position: relative;
  }
  .lesson-card:hover { border-color: var(--brand-primary-soft); }
  .lesson-card.is-selected {
    border-color: var(--brand-primary, #b7925a);
    background: var(--brand-primary-soft);
  }
  .lesson-card.is-disabled {
    opacity: 0.55;
    background: var(--cream-2);
    cursor: not-allowed;
  }
  .lesson-card input[type="checkbox"] {
    width: 18px; height: 18px;
    margin-top: 2px;
    accent-color: var(--ink);
    flex-shrink: 0; cursor: pointer;
  }
  .lesson-card .body { flex: 1; min-width: 0; }
  .lesson-card .name {
    font-size: 14px; font-weight: 600;
    color: var(--ink);
    margin: 0 0 6px;
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
  }
  .lesson-card .duplicate-warn {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; font-weight: 600;
    color: var(--rose);
    background: var(--rose-soft);
    padding: 2px 10px;
    border-radius: 100px;
  }
  .lesson-card .details {
    display: none;
    margin-top: 8px;
    padding: 10px 12px;
    background: var(--cream-2);
    border-left: 3px solid var(--brand-primary, #b7925a);
    border-radius: 6px;
    font-size: 12px; color: var(--ink-dim);
    line-height: 1.6;
  }
  .lesson-card.is-selected .details { display: block; }
  .lesson-card .details strong { color: var(--ink); font-weight: 600; }
  .lesson-card .details .copy-as { color: var(--ink); font-weight: 600; margin-top: 6px; display: block; }

  .chip {
    display: inline-flex; align-items: center;
    padding: 2px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    border: 1px solid transparent;
  }
  .chip-term {
    background: var(--brand-primary-soft);
    color: var(--brand-primary, #b7925a);
    border-color: color-mix(in srgb, var(--brand-primary, #b7925a) 22%, transparent);
  }

  .form-actions {
    display: flex; justify-content: flex-end; gap: 12px;
    padding-top: 24px;
    margin-top: 28px;
    border-top: 1px solid var(--border);
  }
  .btn-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px;
    border-radius: 100px;
    font-size: 13px; font-weight: 600;
    text-decoration: none;
    border: 1px solid var(--border-strong);
    background: var(--paper); color: var(--ink);
    cursor: pointer; font-family: var(--body);
    transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
  }
  .btn-pill:hover {
    transform: translateY(-1px);
    box-shadow: var(--shadow);
    color: var(--ink);
  }
  .btn-pill:disabled, .btn-pill[disabled] {
    opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none;
  }
  .btn-pill.primary {
    background: var(--brand-primary, #b7925a); color: var(--cream); border-color: var(--brand-primary, #b7925a);
  }
  .btn-pill.primary:hover {
    background: var(--brand-primary, #b7925a); color: var(--cream); border-color: var(--brand-primary, #b7925a);
  }
  .btn-pill.primary:disabled:hover {
    background: var(--brand-primary, #b7925a); color: var(--cream); border-color: var(--brand-primary, #b7925a);
  }
  .btn-pill i { font-size: 12px; }
</style>
